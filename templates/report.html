<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report a Scam – Fraud Rescue</title>

    <!-- ✅ FIXED CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="header">
    <div class="nav">
        <!-- ✅ FIXED LOGO -->
        <img src="{{ url_for('static', filename='logo.svg') }}" alt="Fraud Rescue Logo">

        <nav>
            <a href="/">Home</a>
            <a href="/report">Report Scam</a>
        </nav>
    </div>
</header>

<section class="form-section">
    <h2>Submit a Scam Report</h2>
    <p class="form-desc">
        Provide accurate details so our analysts can review your case properly.
    </p>

    <form action="/submit" method="POST" enctype="multipart/form-data">
        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>Email Address</label>
        <input type="email" name="email" required>

        <label>Phone Number</label>
        <input type="text" name="phone" required>

        <label>Case Description</label>
        <textarea name="desc" rows="6" required></textarea>

        <label>Upload Evidence</label>
        <input type="file" name="file">

        <button type="submit" class="cta-button">Submit Report</button>
    </form>
</section>

<footer class="footer">
    <p>© 2026 Fraud Rescue</p>
</footer>

</body>
</html>
